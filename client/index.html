<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/idea.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgroHub</title>

    <!-- ✅ Add this before any CSS loads -->
    <script>
      // Prevents light mode flash before React loads
      (function () {
        try {
          const theme = localStorage.getItem("theme");
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
